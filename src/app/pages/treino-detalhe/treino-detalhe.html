<div class="detalhe-container" *ngIf="treino">

  <!-- NAVBAR -->
  <nav class="navbar">
    <img src="imgs/Logo_Academia.png" alt="Logo" class="logo-navbar logo-escura" />
    <img src="imgs/_Logo_Academia-claro.png" alt="Logo" class="logo-navbar logo-clara" />
    <ul class="nav-links">
      <li (click)="navegarPara('/home')">Home</li>
      <li (click)="navegarPara('/treinos')">Treinos</li>
      <li (click)="navegarPara('/planos')">Planos</li>
      <li (click)="navegarPara('/contato')">Contato</li>
      <li (click)="navegarPara('/perfil')">Perfil</li>
      <li class="sair" (click)="navegarPara('/login')">Sair</li>
    </ul>
  </nav>

  <!-- CABEÇALHO DO TREINO -->
  <div class="cabecalho-detalhe">
    <button class="voltar-btn" (click)="voltar()">&#10094; Voltar</button>
    <span class="emoji-grande">{{ treino.emoji }}</span>
    <h1>{{ treino.nome }}</h1>
    <p class="categoria-badge">{{ treino.categoria }}</p>
    <p class="aviso-remoto">
      📹 Treino planejado pelo seu profissional. Assista às fotos e vídeos de execução caso esteja treinando fora da academia.
    </p>
  </div>

  <!-- ABAS DE NÍVEL -->
  <div class="abas-nivel">
    <button
      *ngFor="let nivel of niveis"
      class="aba-btn"
      [class.ativa]="nivelAtivo === nivel"
      (click)="selecionarNivel(nivel)">
      {{ nivel }}
    </button>
  </div>


<div class="nao-encontrado" *ngIf="!treino">
  <p>Treino não encontrado.</p>
  <button (click)="voltar()">Voltar para Treinos</button>
</div>
